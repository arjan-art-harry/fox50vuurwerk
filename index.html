<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Fox Vuurwerk</title>
    <style>
        body {
            margin: 0;
            text-align: center;
            background-color: black;
        }

        img {
            width: 100%;
            max-width: 900px;
        }

        button {
            margin-top: 20px;
            padding: 15px 25px;
            font-size: 18px;
            background-color: red;
            color: white;
            border: none;
            cursor: pointer;
        }

        #verjaardag {
            display: none;
        }
    </style>
</head>
<body>

<img src="winkel.jpg">

<br>

<button onclick="toonVerjaardag()">
Klik hier op 21 april 2026
</button>

<div id="verjaardag">
    <img src="verjaardag.jpg">
</div>

<script>
function toonVerjaardag() {
    document.getElementById("verjaardag").style.display = "block";
}
</script>

</body>
</html>
