<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Fox Vuurwerk</title>

    <style>
        body {
            margin: 0;
            background-color: black;
            text-align: center;
            font-family: Arial, sans-serif;
        }

        img {
            width: 100%;
            height: auto;
            max-width: 1000px;
        }

        button {
            margin: 20px;
            padding: 15px 30px;
            font-size: 20px;
            background-color: red;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
        }

        #verjaardag, #terugKnop {
            display: none;
        }
    </style>
</head>

<body>

    <!-- Winkel foto -->
    <div id="winkel">
        <img src="winkel2.jpg" alt="Winkel">
    </div>

    <!-- Knop naar verjaardag -->
    <button id="naarVerjaardag" onclick="wisselNaarVerjaardag()">
        Klik hier op 21 april 2026
    </button>

    <!-- Verjaardag foto -->
    <div id="verjaardag">
        <img src="verjaardag2.jpg" alt="Verjaardag">
    </div>

    <!-- Terug knop -->
    <button id="terugKnop" onclick="wisselNaarWinkel()">
        Terug
    </button>

    <script>
        function wisselNaarVerjaardag() {
            document.getElementById("winkel").style.display = "none";
            document.getElementById("naarVerjaardag").style.display = "none";
            document.getElementById("verjaardag").style.display = "block";
            document.getElementById("terugKnop").style.display = "inline-block";
        }

        function wisselNaarWinkel() {
            document.getElementById("winkel").style.display = "block";
            document.getElementById("naarVerjaardag").style.display = "inline-block";
            document.getElementById("verjaardag").style.display = "none";
            document.getElementById("terugKnop").style.display = "none";
        }
    </script>

</body>
</html>
